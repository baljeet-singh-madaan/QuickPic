<div
  class="bg-background text-on-background font-body antialiased min-h-screen flex flex-col md:flex-row overflow-x-hidden">
  <!-- Left Side: Brand Visual (Hidden on mobile/tablet, visible on desktop) -->
  <section class="hidden lg:flex flex-1 relative overflow-hidden bg-surface-container-low">
    <!-- Visual Content Layer -->
    <div class="absolute inset-0 z-0">
      <img alt="Atmospheric photography background"
        class="w-full h-full object-cover opacity-60 mix-blend-luminosity grayscale hover:grayscale-0 transition-all duration-[2s] scale-105"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuDcC1tqauKvoj7vI5fQXEHqQKs0NR4G9ghj2cocKJZQ9FLeFTaPmETtzK18qwW4VuCsadw45e6hUArlf65ekf4iFQvQcoi4b0zMoWfXC-EtTPDzP9u7mZj-Tx0mSyC9AGFwnhFlezZCik93hO8aJeaJ7cwCNiFTVAvGiDU0LBfPYP3n8GlvU71ANEfbDNowmloC517GBKGeUqYFRCwKVM7cXRk8bIdNacb5f2kgOsrUU3OAAkNCiv0CdAtxOj2KuwecavngWZSWW8hb" />
      <div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-background/40"></div>
      <div class="absolute inset-0 bg-primary/5 mix-blend-overlay"></div>
    </div>
    <!-- Overlay Branding -->
    <div class="relative z-10 w-full h-full flex flex-col items-center justify-center p-12 text-center">
      <div class="bg-surface/30 backdrop-blur-xl border border-white/10 p-10 rounded-[2rem] shadow-2xl max-w-sm">
        <div
          class="relative w-24 h-24 mb-6 mx-auto flex items-center justify-center bg-primary-container rounded-2xl shadow-xl shadow-primary/20">
          <span
            class="material-symbols-outlined text-on-primary-container text-5xl absolute -translate-x-1.5 -translate-y-1.5">photo_camera</span>
          <span
            class="material-symbols-outlined text-on-primary-container text-4xl absolute translate-x-2.5 translate-y-2.5"
            style="font-variation-settings: 'FILL' 1;">bolt</span>
        </div>
        <h2 class="font-headline text-5xl font-extrabold tracking-tight text-white mb-3">QuickPic</h2>
        <p class="text-primary text-lg font-semibold tracking-widest uppercase mb-6">Archive the Moment</p>
        <p class="text-white/60 text-sm leading-relaxed max-w-[240px] mx-auto">
          The professional standard for high-fidelity photography storage and curation.
        </p>
      </div>
    </div>
  </section>
  <!-- Right Side: Login Form -->
  <div class="w-full lg:w-1/2 flex flex-col bg-background p-6 md:p-12 lg:p-20 overflow-y-auto">
    <!-- Mobile Brand Identity (Visible on mobile/tablet only) -->
    <div class="lg:hidden flex flex-col items-center text-center mt-8 mb-12">
      <div class="w-16 h-16 mb-4 rounded-xl overflow-hidden">
        <img alt="QuickPic Logo" class="w-full h-full object-cover" src="assets/quickpicLogo.png" />
      </div>
      <h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface">QuickPic</h1>
      <p class="text-on-surface-variant text-sm mt-2 font-medium">High-Quality Storage</p>
    </div>
    <!-- Desktop Header -->
    <div class="max-w-md w-full mx-auto my-auto flex flex-col">
      <header class="mb-10 lg:text-left text-center">
        <h2 class="font-headline text-4xl lg:text-5xl font-bold text-on-surface mb-3">Welcome back!</h2>
        <p class="text-on-surface-variant font-medium text-lg lg:text-base">Sign in to your photo archive</p>
      </header>

      @if (!showEmailFields) {
      <div class="flex flex-col gap-4" id="social-options">
        <div class="flex flex-col gap-4" id="social-buttons-wrapper">
          <!-- Google -->
          <button (click)="onGoogle()"
            class="w-full flex items-center justify-center gap-3 bg-surface-container-high hover:bg-surface-container transition-colors text-on-surface py-4 px-6 rounded-xl font-bold border border-outline-variant/10"
            type="button">
            <svg class="w-5 h-5" viewbox="0 0 24 24">
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4"></path>
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853"></path>
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                fill="#FBBC05"></path>
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-5.38z"
                fill="#EA4335"></path>
            </svg>
            Continue with Google
          </button>
          <!-- Facebook -->
          <!-- <button (click)="onFacebook()"
                            class="w-full flex items-center justify-center gap-3 bg-surface-container-high hover:bg-surface-container transition-colors text-on-surface py-4 px-6 rounded-xl font-bold border border-outline-variant/10"
                            type="button">
                            <svg class="w-5 h-5" fill="#1877F2" viewbox="0 0 24 24">
                                <path
                                    d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z">
                                </path>
                            </svg>
                            Continue with Facebook
                        </button> -->

          <!-- Email Toggle Button -->
          <button (click)="showEmail()"
            class="w-full flex items-center justify-center gap-3 bg-surface-container-high hover:bg-surface-container transition-colors text-on-surface py-4 px-6 rounded-xl font-bold border border-outline-variant/10"
            id="show-email-fields" type="button">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
            </svg>
            Continue with Email</button>

          <div class="flex items-center gap-4 my-2">
            <div class="h-[1px] flex-1 bg-outline-variant/30"></div>
            <span class="text-on-surface-variant text-[10px] font-extrabold tracking-[0.2em] uppercase">OR</span>
            <div class="h-[1px] flex-1 bg-outline-variant/30"></div>
          </div>

          <!-- Guest Button -->
          <button (click)="onGuest()"
            class="w-full flex items-center justify-center gap-3 bg-surface-container-high hover:bg-surface-container transition-colors text-on-surface py-4 px-6 rounded-xl font-bold border border-outline-variant/10"
            id="show-email-fields" type="button">
            <span
              class="material-symbols-outlined text-[18px] group-hover:scale-110 transition-transform">person_outline</span>
            Continue as Guest</button>
        </div>
      </div>
      }
      <!-- Login Form -->
      @else{
      <div id="email-form-container">
        <form action="#" class="space-y-5">
          <div class="group">
            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2 ml-1"
              for="email">Email Address</label>
            <input [(ngModel)]="email" name="email"
              class="w-full bg-surface-container border-none focus:ring-1 focus:ring-primary/40 rounded-xl h-12 px-4 text-on-surface placeholder:text-on-surface-variant/40 transition-all outline-none"
              id="email" placeholder="name@example.com" type="email" />
          </div>
          <div class="group">
            <div class="flex justify-between items-center mb-2 px-1">
              <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider"
                for="password">Password</label>
              <a class="text-[10px] font-bold text-primary uppercase tracking-wider hover:opacity-80"
                href="#">Forgot?</a>
            </div>
            <input [(ngModel)]="password" name="password"
              class="w-full bg-surface-container border-none focus:ring-1 focus:ring-primary/40 rounded-xl h-12 px-4 text-on-surface placeholder:text-on-surface-variant/40 transition-all outline-none"
              id="password" placeholder="••••••••" type="password" />
          </div>
          <button (click)="onLogin()"
            class="w-full bg-primary text-on-primary font-bold h-12 rounded-xl mt-4 shadow-lg shadow-primary/10 hover:shadow-primary/30 transition-all active:scale-[0.98]"
            type="submit">
            Login
          </button>
        </form>
        <div class="mt-6 flex justify-center">
          <button
            class="flex items-center gap-2 text-xs font-bold text-primary uppercase tracking-wider hover:opacity-80 transition-opacity"
            (click)="backToSocial()">
            <span class="material-symbols-outlined text-[16px]">arrow_back</span>
            Back to options
          </button>
        </div>
      </div>
      }
      <!-- Footer Links -->
      <div class="mt-16 text-center">
        <p class="text-on-surface-variant font-semibold">
          Don't have an account?
          <a class="text-primary hover:text-primary/80 transition-colors font-bold ml-1" routerLink="/register">Sign
            up</a>
        </p>
      </div>
    </div>
  </div>
</div>
